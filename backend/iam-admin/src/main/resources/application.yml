server:
  port: 8081
  servlet:
    context-path: /iam

spring:
  application:
    name: iam-admin
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/iam?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${DB_USER:iam}
    password: ${DB_PASS:iam123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  liquibase:
    change-log: classpath:db/changelog/master.xml
    enabled: true
  redis:
    host: ${REDIS_HOST:localhost}
    port: 6379
    password: ${REDIS_PASS:}
    timeout: 3000ms

iam:
  jwt:
    # ponytail: must share the SAME secret as iam-auth-server so both services verify the same JWTs.
    secret: ${IAM_JWT_SECRET:CHANGE_ME_super_secret_at_least_32_bytes_long_for_HS256}
    issuer: iam-platform
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000

logging:
  level:
    com.iam: INFO
    org.springframework.security: INFO
