server:
  port: 8081
  servlet:
    context-path: /iam

spring:
  datasource:
    # 加密说明：与 auth-server 共享同一数据库，使用相同的 ENC() 加密值。
    # 请参考 auth-server 的 application-dev.yml 注释，用 ConfigEncryptTool 生成。
    url: 'ENC(v1:XYUe7WjqWe0IpyUO:K5S6FWcNCm/oMeJROAlMQwdL+VWyCjwd4D0R9Jpss1Y6UCOheVTp7+zkCwNbktqqSUTSZG5MVSia36UMaTFLsBzXV3TErXIuNcSEXYW0+25mgeCqKdjjdV36N9XCBsRffl1npvLPJebPnCJUuDtOERixft7QZt6lWjkxisbYVeYsDxCU1Nu0EmgIOF7zVRKvlr8vcuTm0wH20oGBTT0jSAoWM5tWF7XoK4Jgyl03obltTxsvg8h0VoGa6Izg4VT9C06f/SpdthE=)'
    username: 'ENC(v1:YG+D9dnPJRoHjfMP:pfRRi42WrA68EeUUONtNs1hVpeBzCTQC)'
    password: 'ENC(v1:Zshb0MK5/sE3AAsl:vGO3xPh1kuLdEnoSHExsCPswUO1mAOyC3GmBu3nE+sw=)'
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  liquibase:
    # disabled — auth-server already manages schema. Avoids startup race.
    enabled: false
  redis:
    host: ${REDIS_HOST:localhost}
    port: 6379
    password: ${REDIS_PASS:}
    timeout: 3000ms

# ponytail: Windows Redis INFO has backslash path → Properties.load throws
# "Malformed \uxxxx encoding" → /actuator/health 503. App still uses Redis fine.
management:
  health:
    redis:
      enabled: false
    ldap:
      enabled: false

iam:
  jwt:
    # RS256 — admin verifies tokens using the same auto-generated RSA keypair as auth-server.
    issuer: iam-platform
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000

logging:
  level:
    com.iam: INFO
    org.springframework: INFO
