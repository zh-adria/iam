server:
  port: 8081
  servlet:
    context-path: /iam

spring:
  datasource:
    # ponytail: shares the same H2 file as iam-auth-server via AUTO_SERVER=TRUE.
    # auth-server owns schema (liquibase) + DemoSeeder; admin just reads/writes.
    url: jdbc:h2:file:${user.home}/iam-dev/iam;AUTO_SERVER=TRUE;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  liquibase:
    # disabled — auth-server already manages schema. Avoids startup race.
    enabled: false
  redis:
    host: ${REDIS_HOST:localhost}
    port: 6379
    password: ${REDIS_PASS:}
    timeout: 3000ms

# ponytail: Windows Redis INFO has backslash path → Properties.load throws
# "Malformed \uxxxx encoding" → /actuator/health 503. App still uses Redis fine.
management:
  health:
    redis:
      enabled: false

iam:
  jwt:
    # ponytail: must match auth-server's IAM_JWT_SECRET so admin can verify tokens issued by auth-server.
    secret: ${IAM_JWT_SECRET:CHANGE_ME_super_secret_at_least_32_bytes_long_for_HS256}
    issuer: iam-platform
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000

logging:
  level:
    com.iam: INFO
    org.springframework: INFO
