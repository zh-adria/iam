  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  liquibase:
    # disabled — auth-server already manages schema. Avoids startup race.
    enabled: false
  redis:
    host: ${REDIS_HOST:localhost}
    port: 6379
    password: ${REDIS_PASS:}
    timeout: 3000ms

# ponytail: Windows Redis INFO has backslash path → Properties.load throws
# "Malformed \uxxxx encoding" → /actuator/health 503. App still uses Redis fine.
management:
  health:
    redis:
      enabled: false
    ldap:
      enabled: false

iam:
  jwt:
    # RS256 — admin verifies tokens using the same auto-generated RSA keypair as auth-server.
    issuer: iam-platform
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000

logging:
  level:
    com.iam: INFO
    org.springframework: INFO
