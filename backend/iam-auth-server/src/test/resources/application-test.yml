server:
  port: 0

spring:
  datasource:
    url: jdbc:h2:mem:iam;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  liquibase:
    change-log: classpath:db/changelog/master.xml
    enabled: true
    contexts: test
  redis:
    host: localhost
    port: 6379

iam:
  jwt:
    secret: test_secret_at_least_32_bytes_long_for_HS256_test_only
    issuer: iam-platform-test
    access-ttl-minutes: 30
    refresh-ttl-days: 7
  password:
    bcrypt-strength: 4
    max-fail-count: 5
    lock-minutes: 30
  mfa:
    totp-issuer: IAM-Test
    totp-digits: 6
    totp-period: 30
  ratelimit:
    login-per-minute: 10
  tenant:
    default: default
  audit:
    tamper-proof: true
  cors:
    allowed-origins: http://localhost:5173
  saml:
    idp:
      metadata-url:
      entity-id:
      sso-url:
    sp:
      entity-id: urn:iam:sp
      acs-base: http://localhost:8080/iam/login/saml2/sso
      frontend-redirect: http://localhost:5173/dashboard
  ldap:
    url:
    base:
    user-dn-pattern: uid={0},ou=people
    manager-dn:
    manager-password:
  sms:
    provider: stub
    code-ttl-seconds: 300
    code-length: 6
  magic-link:
    base-url: http://localhost:5173/magic-callback
    ttl-minutes: 15
  social:
    wechat: { app-id: , app-secret: }
    alipay: { app-id: , app-private-key: }
    qq: { app-id: , app-key: }
    dingtalk: { app-id: , app-secret: }
    wecom: { corp-id: , agent-id: , corp-secret: }
  cas:
    server-url:
    service-url: http://localhost:8080/iam/api/auth/cas/callback
  webauthn:
    enabled: false
    rp-id: localhost
    rp-name: IAM-Test
    origin: http://localhost:5173
  scim:
    enabled: false
  kerberos:
    enabled: false
    realm:

logging:
  level:
    com.iam: INFO
    org.springframework: WARN
