server:
  port: 8080
  servlet:
    context-path: /iam

spring:
  application:
    name: iam-auth-server
  datasource:
    # 加密配置：请用 ConfigEncryptTool 生成 ENC() 值，通过环境变量 IAM_CONFIG_KEY 解密
    url: 'ENC(v1:XYUe7WjqWe0IpyUO:K5S6FWcNCm/oMeJROAlMQwdL+VWyCjwd4D0R9Jpss1Y6UCOheVTp7+zkCwNbktqqSUTSZG5MVSia36UMaTFLsBzXV3TErXIuNcSEXYW0+25mgeCqKdjjdV36N9XCBsRffl1npvLPJebPnCJUuDtOERixft7QZt6lWjkxisbYVeYsDxCU1Nu0EmgIOF7zVRKvlr8vcuTm0wH20oGBTT0jSAoWM5tWF7XoK4Jgyl03obltTxsvg8h0VoGa6Izg4VT9C06f/SpdthE=)'
    username: 'ENC(v1:YG+D9dnPJRoHjfMP:pfRRi42WrA68EeUUONtNs1hVpeBzCTQC)'
    password: 'ENC(v1:Zshb0MK5/sE3AAsl:vGO3xPh1kuLdEnoSHExsCPswUO1mAOyC3GmBu3nE+sw=)'
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate.format_sql: true
  liquibase:
    change-log: classpath:db/changelog/master.xml
    enabled: true
  redis:
    host: ${REDIS_HOST:localhost}
    port: 6379
    password: ${REDIS_PASS:}
    timeout: 3000ms
iam:
  jwt:
    # RS256 (RSA keypair). Auto-generates a 2048-bit key on startup; configure these
    # to pin a keypair across restarts (PEM-encoded):
    #   iam.jwt.rsa-private-key-pem=...
    #   iam.jwt.rsa-public-key-pem=...
    issuer: iam-platform
    access-ttl-minutes: 30
    refresh-ttl-days: 7
  tenant:
    # Enable SCHEMA-per-tenant isolation (Hibernate multi-tenant routing). When false (default)
    # all tenants share the public schema — backwards compatible.
    multi-tenant-enabled: false
  password:
    bcrypt-strength: 10
    max-fail-count: 5
    lock-minutes: 30
  mfa:
    totp-issuer: IAM-Platform
    totp-digits: 6
    totp-period: 30
  ratelimit:
    login-per-minute: 10
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000
  saml:
    enabled: false
    idp:
      # ponytail: leave empty to disable SAML SSO. Fill in for real IdP (Azure AD / Shibboleth / Keycloak).
      metadata-url:
      entity-id:
      sso-url:
    sp:
      entity-id: urn:iam:sp
      acs-base: http://localhost:8080/iam/login/saml2/sso
      frontend-redirect: http://localhost:5173/dashboard
  ldap:
    # ponytail: empty url disables LDAP. For AD use url=ldaps://ad.corp:636 user-dn-pattern={0}@corp
    url:
    base:
    user-dn-pattern: uid={0},ou=people
    manager-dn:
    manager-password:
  sms:
    # provider: stub | aliyun (tencent stub: implement SmsSender interface)
    provider: stub
    code-ttl-seconds: 300
    code-length: 6
    # Aliyun Dysmsapi 2017-05-25 config (provider=aliyun)
    aliyun-access-key:
    aliyun-secret:
    aliyun-sign-name:
    aliyun-template-code:
    aliyun-endpoint: dysmsapi.aliyuncs.com
  magic-link:
    # provider: stub | smtp, base-url used in the link sent
    provider: stub
    base-url: http://localhost:5173/magic-callback
    ttl-minutes: 15
    # SMTP config (provider=smtp)
    smtp-host: smtp.example.com
    smtp-port: 587
    smtp-username:
    smtp-password:
    smtp-from: noreply@example.com
    smtp-starttls: true
  social:
    # Facebook: fill appId/appSecret per provider to enable. Callback URL = /iam/api/auth/social/{provider}/callback
    wechat:
      app-id:
      app-secret:
    alipay:
      app-id:
      app-private-key:
      alipay-public-key:   # RSA2 public key (for verifying Alipay response)
    qq:
      app-id:
      app-key:
    dingtalk:
      app-id:
      app-secret:
    wecom:
      corp-id:
      agent-id:
      corp-secret:
  cas:
    # ponytail: CAS server base URL. SP-style: validate service ticket via /cas/serviceValidate
    server-url:
    service-url: http://localhost:8080/iam/api/auth/cas/callback

logging:
  level:
    com.iam: INFO
    org.springframework.security: INFO
