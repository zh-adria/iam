server:
  port: 8080
  servlet:
    context-path: /iam

spring:
  datasource:
    url: 'ENC(v1:qdr4pu5G2KgKhbsd:JiHf0jo0eGkhVKeBR4obE8X5S2FxtZh/dO8I+jseGoRX0TnuQDu6gY6zdM34dCx9VTlDVzmvlASBmt1DwCOWDmpDd4NEq84xoHWDjE86p7H5mlIYCqzegF8EOkBy6s8+cPMFtmK04cE3BEQzKOvH7USk6o0H2IYs245rGZMvOUi+4T95Yriox2pnaeA8sTHLw5ox3EP6i7rZzaEbJ6ZDHRUVTkkEYqOHmtI=)'
    username: 'ENC(v1:bKyp8tixmxU9yNoY:CFOR70P04O+9Q9n2QTHwi+kSmm2pHLtd)'
    password: 'ENC(v1:+LvnX7j1+CCpyYLP:sPtTiczWYu6EfGAfPX5ikjyZhU4Bwo/SD1uyrp7u1R4=)'
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  liquibase:
    change-log: classpath:db/changelog/master.xml
    enabled: true
    contexts: dev
    drop-first: true
  redis:
    host: ${REDIS_HOST:localhost}
    port: 6379
    password: ${REDIS_PASS:}
    timeout: 3000ms

# ponytail: Windows Redis INFO returns the executable path with backslashes
# (C:\Users\...). Spring's Properties.load treats \U as a bad escape and throws
# "Malformed \uxxxx encoding" — fails the actuator redis health check, which
# makes /actuator/health return 503 and dev.ps1 think auth-server never came up.
# The app itself uses Redis fine; only the indicator is broken. Disable in dev.
# LDAP/SAML/CAS etc. are also stubbed in dev — disable those indicators too so
# the aggregated health endpoint returns UP.
management:
  health:
    redis:
      enabled: false
    ldap:
      enabled: false

iam:
  jwt:
    # RS256 auto-generated RSA-2048 key on startup. Pin via iam.jwt.rsa-*-pem to stabilize.
    issuer: iam-platform
    access-ttl-minutes: 30
    refresh-ttl-days: 7
  scim:
    auth-token: dev-scim-secret-change-in-prod
  password:
    bcrypt-strength: 10
    max-fail-count: 5
    lock-minutes: 30
  mfa:
    totp-issuer: IAM-Platform
    totp-digits: 6
    totp-period: 30
  ratelimit:
    login-per-minute: 10
  tenant:
    multi-tenant-enabled: false
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000
  saml:
    enabled: false
    idp:
      metadata-url:
      entity-id:
      sso-url:
    sp:
      entity-id: urn:iam:sp
      acs-base: http://localhost:8080/iam/login/saml2/sso
      frontend-redirect: http://localhost:5173/dashboard
  ldap:
    url:
    base:
    user-dn-pattern: uid={0},ou=people
    manager-dn:
    manager-password:
  sms:
    provider: stub
    code-ttl-seconds: 300
    code-length: 6
    aliyun-endpoint: dysmsapi.aliyuncs.com
  magic-link:
    provider: stub
    base-url: http://localhost:5173/magic-callback
    ttl-minutes: 15
  social:
    wechat: { app-id: , app-secret: }
    alipay: { app-id: , app-private-key: , alipay-public-key: }
    qq: { app-id: , app-key: }
    dingtalk: { app-id: , app-secret: }
    wecom: { corp-id: , agent-id: , corp-secret: }
  cas:
    server-url:
    service-url: http://localhost:8080/iam/api/auth/cas/callback

logging:
  level:
    com.iam: INFO
    org.springframework: INFO
