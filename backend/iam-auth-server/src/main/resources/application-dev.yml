server:
  port: 8080
  servlet:
    context-path: /iam

spring:
  datasource:
    # 加密说明：以下 ENC() 值需用 ConfigEncryptTool 生成。
    # 1) 编译: cd backend && mvn -pl iam-common -am compile -q
    # 2) 加密: java -cp iam-common/target/classes com.iam.infrastructure.config.ConfigEncryptTool <你的IAM_CONFIG_KEY> "jdbc:mysql://mysql6.sqlpub.com:3311/dev_2026?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai"
    # 3) 加密: java -cp iam-common/target/classes com.iam.infrastructure.config.ConfigEncryptTool <你的IAM_CONFIG_KEY> "dev_2026"
    # 4) 加密: java -cp iam-common/target/classes com.iam.infrastructure.config.ConfigEncryptTool <你的IAM_CONFIG_KEY> "uF5RbUeRzGxb9qgG"
    # 5) 将输出替换下方的 ENC(...) 值。
    url: 'ENC(v1:XYUe7WjqWe0IpyUO:K5S6FWcNCm/oMeJROAlMQwdL+VWyCjwd4D0R9Jpss1Y6UCOheVTp7+zkCwNbktqqSUTSZG5MVSia36UMaTFLsBzXV3TErXIuNcSEXYW0+25mgeCqKdjjdV36N9XCBsRffl1npvLPJebPnCJUuDtOERixft7QZt6lWjkxisbYVeYsDxCU1Nu0EmgIOF7zVRKvlr8vcuTm0wH20oGBTT0jSAoWM5tWF7XoK4Jgyl03obltTxsvg8h0VoGa6Izg4VT9C06f/SpdthE=)'
    username: 'ENC(v1:YG+D9dnPJRoHjfMP:pfRRi42WrA68EeUUONtNs1hVpeBzCTQC)'
    password: 'ENC(v1:Zshb0MK5/sE3AAsl:vGO3xPh1kuLdEnoSHExsCPswUO1mAOyC3GmBu3nE+sw=)'
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  liquibase:
    change-log: classpath:db/changelog/master.xml
    enabled: true
    contexts: dev
    drop-first: true
  redis:
    host: ${REDIS_HOST:localhost}
    port: 6379
    password: ${REDIS_PASS:}
    timeout: 3000ms

# ponytail: Windows Redis INFO returns the executable path with backslashes
# (C:\Users\...). Spring's Properties.load treats \U as a bad escape and throws
# "Malformed \uxxxx encoding" — fails the actuator redis health check, which
# makes /actuator/health return 503 and dev.ps1 think auth-server never came up.
# The app itself uses Redis fine; only the indicator is broken. Disable in dev.
# LDAP/SAML/CAS etc. are also stubbed in dev — disable those indicators too so
# the aggregated health endpoint returns UP.
management:
  health:
    redis:
      enabled: false
    ldap:
      enabled: false

iam:
  jwt:
    # RS256 auto-generated RSA-2048 key on startup. Pin via iam.jwt.rsa-*-pem to stabilize.
    issuer: iam-platform
    access-ttl-minutes: 30
    refresh-ttl-days: 7
  scim:
    auth-token: dev-scim-secret-change-in-prod
  password:
    bcrypt-strength: 10
    max-fail-count: 5
    lock-minutes: 30
  mfa:
    totp-issuer: IAM-Platform
    totp-digits: 6
    totp-period: 30
  ratelimit:
    login-per-minute: 10
  tenant:
    multi-tenant-enabled: false
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000
  saml:
    enabled: false
    idp:
      metadata-url:
      entity-id:
      sso-url:
    sp:
      entity-id: urn:iam:sp
      acs-base: http://localhost:8080/iam/login/saml2/sso
      frontend-redirect: http://localhost:5173/dashboard
  ldap:
    url:
    base:
    user-dn-pattern: uid={0},ou=people
    manager-dn:
    manager-password:
  sms:
    provider: stub
    code-ttl-seconds: 300
    code-length: 6
    aliyun-endpoint: dysmsapi.aliyuncs.com
  magic-link:
    provider: stub
    base-url: http://localhost:5173/magic-callback
    ttl-minutes: 15
  social:
    wechat: { app-id: , app-secret: }
    alipay: { app-id: , app-private-key: , alipay-public-key: }
    qq: { app-id: , app-key: }
    dingtalk: { app-id: , app-secret: }
    wecom: { corp-id: , agent-id: , corp-secret: }
  cas:
    server-url:
    service-url: http://localhost:8080/iam/api/auth/cas/callback

logging:
  level:
    com.iam: INFO
    org.springframework: INFO
